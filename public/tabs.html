  <script async defer type="module">
    import { newTab, switchTab, closeTab } from "/lithium.mjs";

    window.newTab = newTab;
    let tabs = [];
    const tabsDiv = document.getElementById("tabs");



    const getIcon = (url) =>
      /^https?:\/\/[\w.-]+\.[a-z]{2,}/i.test(url)
        ? `https://s2.googleusercontent.com/s2/favicons?sz=64&domain_url=${url}`
        : "/assets/img/logo.png";

    function createTab(id, title = "new tab", url = "") {
      const tab = document.createElement("div");
      tab.dataset.tabId = id;
      tab.draggable = true;

      tab.innerHTML = `
    <img alt="Favicon" src="${getIcon(url)}" />
    <span class="tab">${title}</span>
    <button>&times;</button>
  `;

      tab.querySelector("button").onclick = (e) => {
        e.stopPropagation();
        closeTab?.(id);
      };
      tab.onclick = () => switchTab?.(id);

      tabsDiv?.appendChild(tab);
      tabs.push({ id, element: tab, title, url });

      return tab;
    }

    function checkState() {
      const frames = [...document.querySelectorAll('iframe[id^="frame-"]')];
      const frameIds = frames.map((f) => parseInt(f.id.replace("frame-", ""), 10));

      tabs = tabs.filter(({ id, element }) => {
        if (!frameIds.includes(id)) {
          element.remove();
          return false;
        }
        return true;
      });

      frameIds.forEach((id) => {
        if (!tabs.some((t) => t.id === id)) createTab(id);
      });

      const visible = frames.find((f) => !f.classList.contains("hidden"));
      if (visible) {
        const activeId = parseInt(visible.id.replace("frame-", ""), 10);
        tabs.forEach(({ id, element }) => {
          const isActive = id === activeId;
          element.classList.toggle("active", isActive);
        });
      }
    }

    document
      .getElementById("new-tab-btn")
      ?.addEventListener("click", () => newTab?.());

    document.addEventListener("new-tab", (e) => {
      if (!tabs.some((t) => t.id === e.detail.tabNumber))
        createTab(e.detail.tabNumber);
      checkState();
    });

    document.addEventListener("switch-tab", (e) => {
      const activeId = e.detail.tabNumber;
      tabs.forEach(({ id, element }) => {
        const isActive = id === activeId;
        element.classList.toggle("active", isActive);
      });
    });

    document.addEventListener("url-changed", (e) => {
      const tab = tabs.find((t) => t.id === e.detail.tabId);
      if (!tab) return;
      tab.title = e.detail.title || "new tab";
      tab.url = e.detail.url || "";
      tab.element.querySelector(".tab").textContent = tab.title;
      tab.element.querySelector("img").src = getIcon(tab.url);
    });

    document.addEventListener("close-tab", (e) => {
      const idx = tabs.findIndex((t) => t.id === e.detail.tabNumber);
      if (idx === -1) return;
      tabs[idx].element.remove();
      tabs.splice(idx, 1);
      checkState();
    });

    checkState();

  </script>
  <link href="/assets/css/tabs.css" rel="stylesheet" />
  <script type="module" async defer>
    import {
      setWisp,
      makeURL,
      getProxied,
      setFrames,
      addressInput,
      setTransport,
      setProxy,
      currentTab,
      Tab
    } from "/lithium.mjs"



    // --- INIT ---
    const form = document.getElementById("form")
    let search =
      localStorage.getItem("search-engine") ||
      "https://search.brave.com/search?q=%s"


    setProxy(localStorage.getItem("pr0xy") || "violet")


    setWisp((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/wisp/");

    setTransport(localStorage.getItem("transportz") || "epoxy");
    async function autofill(url) {
      const urlToLoad = makeURL(url, search)
      const proxiedUrl = await getProxied(urlToLoad)
      setTimeout(() => {

        document.getElementById(`frame-${currentTab}`).src = proxiedUrl;
      }, 200);
    }

    try {
      const params = new URLSearchParams(window.location.search);
      const url = params.get('autofill');
      if (url) autofill(url);

    } catch { }

    // --- EVENTS ---
    form?.addEventListener("submit", async (event) => {
      event.preventDefault()

      const urlToLoad = makeURL(addressInput.value, search)
      const proxiedUrl = await getProxied(urlToLoad)

      let currentFrame = document.getElementById(`frame-${currentTab}`);

      currentFrame.src = proxiedUrl

      if (currentFrame === document.getElementById(`frame-${currentTab}`)) {
        addressInput.value = urlToLoad

        if (urlToLoad == "newtab.html") {
          addressInput.value = "celestial://newtab"
        }

      }
    })



    setFrames(document.getElementById("frames"));
    new Tab();
  </script>

<script>
  function setting() {
  document.getElementById('settings').style.display = 'block';
  document.querySelector('.settings-bg').style.display = 'block';
}

function exitSetting() {
  document.getElementById('settings').style.display = 'none';
  document.querySelector('.settings-bg').style.display = 'none';
}

document.getElementById('close').addEventListener('click', exitSetting);
